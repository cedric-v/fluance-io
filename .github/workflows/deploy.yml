name: Deploy site to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_validation:
        description: 'Exécuter les rapports Lighthouse et W3C'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          ELEVENTY_ENV: prod
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: npm run build

      - name: Verify CSS is generated
        run: |
          echo "🔍 Vérification que styles.css est bien généré..."
          if [ ! -f "_site/assets/css/styles.css" ]; then
            echo "❌ Le fichier styles.css est manquant"
            exit 1
          fi
          CSS_SIZE=$(stat -f%z "_site/assets/css/styles.css" 2>/dev/null || stat -c%s "_site/assets/css/styles.css" 2>/dev/null || echo "0")
          if [ "$CSS_SIZE" -lt 1000 ]; then
            echo "⚠️ Le fichier styles.css semble trop petit ($CSS_SIZE octets)"
            exit 1
          fi
          echo "✅ styles.css présent et valide ($(numfmt --to=iec-i --suffix=B $CSS_SIZE 2>/dev/null || echo "${CSS_SIZE}B"))"

      - name: Ensure .nojekyll exists before upload
        run: |
          # S'assurer que .nojekyll existe avant l'upload
          if [ ! -f "_site/.nojekyll" ]; then
            echo "⚠️ .nojekyll manquant, création du fichier..."
            touch "_site/.nojekyll"
          fi
          echo "✅ .nojekyll présent avant upload"
          ls -la _site/.nojekyll

      - name: Upload artifact for smoke tests
        uses: actions/upload-artifact@v7
        with:
          path: _site
          name: build-artifact
          retention-days: 1

      - name: Verify build artifact contents
        run: |
          echo "🔍 Vérification du contenu de l'artifact build..."
          
          # Vérifier que _site existe et contient des fichiers
          if [ ! -d "_site" ]; then
            echo "❌ Le dossier _site n'existe pas"
            exit 1
          fi
          
          # Vérifier les fichiers critiques
          CRITICAL_FILES=(
            "index.html"
            "fr/index.html"
            "en/index.html"
            "assets/css/styles.css"
            "CNAME"
            ".nojekyll"
            "404.html"
          )
          
          MISSING_FILES=0
          for file in "${CRITICAL_FILES[@]}"; do
            if [ ! -f "_site/$file" ]; then
              echo "  ❌ Fichier manquant: $file"
              MISSING_FILES=$((MISSING_FILES + 1))
            else
              echo "  ✅ Fichier présent: $file"
            fi
          done
          
          # Vérifier qu'il y a des fichiers HTML
          HTML_COUNT=$(find _site -name "*.html" -type f | wc -l)
          echo ""
          echo "📊 Statistiques de l'artifact:"
          echo "  - Fichiers HTML: $HTML_COUNT"
          echo "  - Taille totale: $(du -sh _site | cut -f1)"
          
          if [ $MISSING_FILES -gt 0 ]; then
            echo ""
            echo "❌ $MISSING_FILES fichier(s) critique(s) manquant(s)"
            exit 1
          fi
          
          echo ""
          echo "✅ Tous les fichiers critiques sont présents dans l'artifact"

      - name: Upload artifact for deployment
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  validate:
    needs: build
    runs-on: ubuntu-latest
    # Ne s'exécute que si demandé manuellement via workflow_dispatch
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.run_validation == 'true' || github.event.inputs.run_validation == true)
    continue-on-error: true
    env:
      # URL de production du site (peut être modifiée dans les variables du repository)
      PRODUCTION_URL: ${{ vars.PRODUCTION_URL || 'https://fluance.io' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          ELEVENTY_ENV: prod
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: npm run build

      - name: Install validation tools
        run: |
          npm install -g lighthouse@latest w3c-html-validator@latest

      - name: Start local server
        run: |
          cd _site
          npx -y http-server -p 8080 --silent &
          echo $! > /tmp/http-server.pid
          sleep 5
          curl -f http://localhost:8080/ || exit 1

      - name: Run Lighthouse audit
        run: |
          mkdir -p reports
          lighthouse http://localhost:8080/ --output=html --output-path=./reports/lighthouse-home.html --chrome-flags="--headless --no-sandbox"
          lighthouse http://localhost:8080/fr/ --output=html --output-path=./reports/lighthouse-fr.html --chrome-flags="--headless --no-sandbox"
          lighthouse http://localhost:8080/en/ --output=html --output-path=./reports/lighthouse-en.html --chrome-flags="--headless --no-sandbox" || true
          
          # Generate JSON reports for summary
          lighthouse http://localhost:8080/ --output=json --output-path=./reports/lighthouse-home.json --chrome-flags="--headless --no-sandbox"
          lighthouse http://localhost:8080/fr/ --output=json --output-path=./reports/lighthouse-fr.json --chrome-flags="--headless --no-sandbox"

      - name: Validate HTML with W3C
        run: |
          mkdir -p reports/w3c
          echo "🔍 Recherche des fichiers HTML..."
          HTML_FILES=$(find _site -name "*.html" -type f | head -10)
          echo "📄 Fichiers trouvés:"
          echo "$HTML_FILES"
          
          if [ -z "$HTML_FILES" ]; then
            echo "⚠️ Aucun fichier HTML trouvé dans _site/"
            echo "Aucun fichier HTML trouvé" > reports/w3c/README.txt
            exit 0
          fi
          
          while read file; do
            if [ -f "$file" ]; then
              # Créer un nom de fichier pour le rapport basé sur le chemin relatif
              REL_PATH=$(echo "$file" | sed 's|^_site/||' | sed 's|^/||')
              REPORT_NAME=$(echo "$REL_PATH" | sed 's|/|_|g' | sed 's|\.html$||' | sed 's|^_||' | sed 's|_index$||')
              if [ -z "$REPORT_NAME" ]; then
                REPORT_NAME="index"
              fi
              
              echo ""
              echo "✅ Validation de: $file"
              echo "   Rapport: reports/w3c/${REPORT_NAME}"
              
              # Utiliser directement l'API W3C Nu Validator (plus fiable)
              # Construire l'URL de production pour remplacer localhost dans les rapports
              # L'URL de production est définie via la variable d'environnement PRODUCTION_URL
              PROD_URL="${PRODUCTION_URL:-https://fluance.io}"
              if [ "$REL_PATH" = "index.html" ]; then
                DOC_URL="${PROD_URL}/"
              elif echo "$REL_PATH" | grep -q "index.html$"; then
                # Cas comme "fr/index.html" -> "https://fluance.io/fr/"
                DIR_PATH=$(dirname "$REL_PATH")
                DOC_URL="${PROD_URL}/${DIR_PATH}/"
              else
                DIR_PATH=$(dirname "$REL_PATH")
                DOC_URL="${PROD_URL}/${DIR_PATH}/"
              fi
              
              # Format HTML
              API_URL_HTML="https://validator.w3.org/nu/?out=html"
              HTTP_CODE=$(curl -s -o ./reports/w3c/"${REPORT_NAME}.html" -w "%{http_code}" -X POST \
                -H "Content-Type: text/html; charset=utf-8" \
                --data-binary "@$file" \
                "$API_URL_HTML" 2>&1)
              
              if [ "$HTTP_CODE" = "200" ] && [ -s ./reports/w3c/"${REPORT_NAME}.html" ]; then
                # Post-traiter le rapport pour remplacer toutes les références à localhost
                # Utiliser perl pour la compatibilité cross-platform (Linux et macOS)
                perl -i -pe "s|http://localhost:8080[^\s\"']*|${DOC_URL}|g" ./reports/w3c/"${REPORT_NAME}.html" 2>/dev/null || \
                sed -i.bak "s|http://localhost:8080[^[:space:]\"']*|${DOC_URL}|g" ./reports/w3c/"${REPORT_NAME}.html" 2>/dev/null && rm -f ./reports/w3c/"${REPORT_NAME}.html.bak" || true
                echo "  ✓ Rapport HTML créé: reports/w3c/${REPORT_NAME}.html (URLs mises à jour)"
              else
                echo "  ⚠️ Erreur HTTP $HTTP_CODE lors de la validation HTML"
                # Afficher les premières lignes du fichier pour debug
                if [ -s ./reports/w3c/"${REPORT_NAME}.html" ]; then
                  echo "  Contenu du rapport (premières lignes):"
                  head -3 ./reports/w3c/"${REPORT_NAME}.html"
                fi
              fi
              
              # Format JSON
              API_URL_JSON="https://validator.w3.org/nu/?out=json"
              HTTP_CODE_JSON=$(curl -s -o ./reports/w3c/"${REPORT_NAME}.json" -w "%{http_code}" -X POST \
                -H "Content-Type: text/html; charset=utf-8" \
                --data-binary "@$file" \
                "$API_URL_JSON" 2>&1)
              
              if [ "$HTTP_CODE_JSON" = "200" ] && [ -s ./reports/w3c/"${REPORT_NAME}.json" ]; then
                # Post-traiter le JSON pour remplacer toutes les références à localhost
                perl -i -pe "s|http://localhost:8080[^\s\"']*|${DOC_URL}|g" ./reports/w3c/"${REPORT_NAME}.json" 2>/dev/null || \
                sed -i.bak "s|http://localhost:8080[^[:space:]\"']*|${DOC_URL}|g" ./reports/w3c/"${REPORT_NAME}.json" 2>/dev/null && rm -f ./reports/w3c/"${REPORT_NAME}.json.bak" || true
                echo "  ✓ Rapport JSON créé: reports/w3c/${REPORT_NAME}.json (URLs mises à jour)"
              else
                echo "  ⚠️ Erreur HTTP $HTTP_CODE_JSON lors de la validation JSON"
              fi
            fi
          done <<< "$HTML_FILES"
          
          echo ""
          echo "📊 Résumé des rapports W3C générés:"
          ls -lah reports/w3c/ || echo "⚠️ Le dossier reports/w3c est vide"
          
          # Créer un fichier README si le dossier est vide
          if [ ! "$(ls -A reports/w3c 2>/dev/null)" ]; then
            echo "⚠️ Aucun rapport W3C généré. Création d'un fichier README."
            echo "Aucun rapport W3C n'a pu être généré lors de cette exécution." > reports/w3c/README.txt
          fi

      - name: Generate validation summary
        run: |
          cat > reports/summary.md << 'EOF'
          # Rapport de validation du site
          
          ## Google Lighthouse
          
          Les rapports Lighthouse sont disponibles dans les fichiers HTML :
          - `lighthouse-home.html` - Page d'accueil
          - `lighthouse-fr.html` - Page française
          - `lighthouse-en.html` - Page anglaise (si disponible)
          
          ## Validateur W3C
          
          Les rapports de validation HTML sont disponibles dans le dossier `w3c/`.
          
          ## Comment consulter les rapports
          
          1. Allez dans l'onglet "Actions" de votre repository GitHub
          2. Cliquez sur le workflow qui vient de s'exécuter
          3. Cliquez sur le job "validate"
          4. Dans la section "Artifacts", téléchargez le fichier "validation-reports"
          5. Décompressez le fichier pour accéder aux rapports HTML
          
          EOF
          cat reports/summary.md

      - name: Stop local server
        if: always()
        run: |
          if [ -f /tmp/http-server.pid ]; then
            kill $(cat /tmp/http-server.pid) || true
          fi

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validation-reports
          path: reports/
          retention-days: 30
          if-no-files-found: warn
      
      - name: List uploaded artifacts
        if: always()
        run: |
          echo "✅ Les rapports ont été uploadés dans l'artifact 'validation-reports'"
          echo "📥 Pour télécharger :"
          echo "   1. Faites défiler jusqu'en bas de cette page"
          echo "   2. Cherchez la section 'Artifacts'"
          echo "   3. Cliquez sur 'validation-reports' pour télécharger le ZIP"
          echo ""
          echo "📊 Contenu de l'artifact :"
          ls -lah reports/ || echo "Dossier reports non trouvé"

  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    # S'exécute automatiquement après chaque build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: _site

      - name: Verify artifact contents after download
        run: |
          echo "🔍 Vérification de l'artifact téléchargé..."
          
          # Vérifier que _site existe
          if [ ! -d "_site" ]; then
            echo "❌ Le dossier _site n'existe pas après téléchargement"
            exit 1
          fi
          
          # Créer .nojekyll s'il manque (les fichiers cachés peuvent être perdus lors de l'upload/téléchargement)
          if [ ! -f "_site/.nojekyll" ]; then
            echo "⚠️ .nojekyll manquant après téléchargement, création du fichier..."
            touch "_site/.nojekyll"
          fi
          
          # Créer CNAME s'il manque
          if [ ! -f "_site/CNAME" ]; then
            echo "⚠️ CNAME manquant après téléchargement, création du fichier..."
            echo "fluance.io" > "_site/CNAME"
          fi
          
          # Vérifier les fichiers critiques
          CRITICAL_FILES=(
            "index.html"
            "fr/index.html"
            "en/index.html"
            "assets/css/styles.css"
            "CNAME"
            ".nojekyll"
            "404.html"
          )
          
          MISSING_FILES=0
          for file in "${CRITICAL_FILES[@]}"; do
            if [ ! -f "_site/$file" ]; then
              echo "  ❌ Fichier manquant: $file"
              MISSING_FILES=$((MISSING_FILES + 1))
            else
              SIZE=$(stat -f%z "_site/$file" 2>/dev/null || stat -c%s "_site/$file" 2>/dev/null || echo "0")
              echo "  ✅ Fichier présent: $file ($(numfmt --to=iec-i --suffix=B $SIZE 2>/dev/null || echo "${SIZE}B"))"
            fi
          done
          
          # Vérifier qu'il y a des fichiers HTML
          HTML_COUNT=$(find _site -name "*.html" -type f | wc -l)
          echo ""
          echo "📊 Statistiques de l'artifact téléchargé:"
          echo "  - Fichiers HTML: $HTML_COUNT"
          echo "  - Taille totale: $(du -sh _site | cut -f1)"
          
          if [ $MISSING_FILES -gt 0 ]; then
            echo ""
            echo "❌ $MISSING_FILES fichier(s) critique(s) manquant(s) dans l'artifact téléchargé (après création automatique)"
            exit 1
          fi
          
          echo ""
          echo "✅ L'artifact téléchargé contient tous les fichiers critiques"

      - name: Verify and create required files
        run: |
          # Vérifier et créer .nojekyll si manquant
          if [ ! -f "_site/.nojekyll" ]; then
            echo "⚠️ .nojekyll manquant, création du fichier..."
            touch "_site/.nojekyll"
          else
            echo "✅ .nojekyll présent"
          fi
          
          # Vérifier et créer CNAME si manquant
          if [ ! -f "_site/CNAME" ]; then
            echo "⚠️ CNAME manquant, création du fichier..."
            echo "fluance.io" > "_site/CNAME"
          else
            echo "✅ CNAME présent"
          fi
          
          # Afficher les fichiers pour debug
          echo ""
          echo "📁 Fichiers à la racine de _site/:"
          ls -la _site/ | head -20

      - name: Start local server
        run: |
          cd _site
          npx -y http-server -p 8080 --silent &
          SERVER_PID=$!
          echo $SERVER_PID > /tmp/http-server.pid
          
          # Attendre que le serveur soit prêt (max 30 secondes)
          echo "⏳ Attente du démarrage du serveur..."
          for i in {1..30}; do
            if curl -s -f http://localhost:8080/ > /dev/null 2>&1; then
              echo "✅ Serveur démarré avec succès (PID: $SERVER_PID)"
              exit 0
            fi
            sleep 1
          done
          
          echo "❌ Le serveur n'a pas démarré dans les 30 secondes"
          if ps -p $SERVER_PID > /dev/null 2>&1; then
            echo "Le processus existe toujours, vérification des logs..."
            kill $SERVER_PID 2>/dev/null || true
          fi
          exit 1

      - name: Run smoke tests
        run: |
          echo "🧪 Démarrage des smoke tests..."
          
          # Liste des pages critiques à tester (status 200 attendu)
          CRITICAL_PAGES=(
            "/"
            "/fr/"
            "/en/"
            "/contact/"
            "/connexion-membre/"
            "/cours-en-ligne/5jours/j1/"
            "/cours-en-ligne/21-jours-mouvement/"
            "/membre/"
            "/404.html"
          )
          
          FAILED_TESTS=0
          PASSED_TESTS=0
          
          # Test des pages critiques (status 200)
          for page in "${CRITICAL_PAGES[@]}"; do
            echo ""
            echo "🔍 Test de: $page"
            
            # Vérifier que la page retourne un status 200
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8080$page")
            
            if [ "$HTTP_CODE" = "200" ]; then
              # Vérifier que la page contient du contenu HTML (au moins un titre et body)
              CONTENT=$(curl -s "http://localhost:8080$page")
              
              if echo "$CONTENT" | grep -q "<title>" && echo "$CONTENT" | grep -q "<body"; then
                # Vérifier que le CSS est référencé dans la page
                if echo "$CONTENT" | grep -q "styles.css"; then
                  echo "  ✅ Status: $HTTP_CODE | Contenu HTML valide | CSS référencé"
                  PASSED_TESTS=$((PASSED_TESTS + 1))
                else
                  echo "  ⚠️ Status: $HTTP_CODE | Contenu HTML valide mais CSS non référencé"
                  PASSED_TESTS=$((PASSED_TESTS + 1))
                fi
              else
                echo "  ❌ Status: $HTTP_CODE | Page vide ou invalide"
                FAILED_TESTS=$((FAILED_TESTS + 1))
              fi
            else
              echo "  ❌ Status: $HTTP_CODE (attendu: 200)"
              FAILED_TESTS=$((FAILED_TESTS + 1))
            fi
          done
          
          # Test spécifique du CSS
          echo ""
          echo "🔍 Test du fichier CSS"
          CSS_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8080/assets/css/styles.css")
          if [ "$CSS_HTTP_CODE" = "200" ]; then
            CSS_CONTENT=$(curl -s "http://localhost:8080/assets/css/styles.css" | head -c 100)
            if echo "$CSS_CONTENT" | grep -q "@" || echo "$CSS_CONTENT" | grep -q "{" || echo "$CSS_CONTENT" | grep -q "tailwind"; then
              echo "  ✅ CSS accessible et valide"
              PASSED_TESTS=$((PASSED_TESTS + 1))
            else
              echo "  ❌ CSS accessible mais contenu invalide"
              FAILED_TESTS=$((FAILED_TESTS + 1))
            fi
          else
            echo "  ❌ CSS non accessible (HTTP $CSS_HTTP_CODE)"
            FAILED_TESTS=$((FAILED_TESTS + 1))
          fi
          
          # Test du fichier CNAME (nécessaire pour le domaine personnalisé)
          echo ""
          echo "🔍 Test du fichier CNAME"
          if [ -f "_site/CNAME" ]; then
            CNAME_CONTENT=$(cat "_site/CNAME" | tr -d '\n\r' | xargs)
            if [ "$CNAME_CONTENT" = "fluance.io" ]; then
              echo "  ✅ CNAME présent et correct: $CNAME_CONTENT"
              PASSED_TESTS=$((PASSED_TESTS + 1))
            else
              echo "  ❌ CNAME présent mais contenu incorrect: '$CNAME_CONTENT' (attendu: 'fluance.io')"
              FAILED_TESTS=$((FAILED_TESTS + 1))
            fi
          else
            echo "  ❌ CNAME manquant dans _site/"
            FAILED_TESTS=$((FAILED_TESTS + 1))
          fi

          # Test du fichier .nojekyll (nécessaire pour désactiver Jekyll sur GitHub Pages)
          echo ""
          echo "🔍 Test du fichier .nojekyll"
          if [ -f "_site/.nojekyll" ]; then
            echo "  ✅ .nojekyll présent (Jekyll désactivé)"
            PASSED_TESTS=$((PASSED_TESTS + 1))
          else
            echo "  ❌ .nojekyll manquant dans _site/ (GitHub Pages pourrait traiter le site avec Jekyll)"
            FAILED_TESTS=$((FAILED_TESTS + 1))
          fi

          # Test de la page 404 personnalisée (page inexistante)
          echo ""
          echo "🔍 Test de la page 404 personnalisée (page inexistante)"
          NOT_FOUND_PAGE="/page-inexistante-test-404"
          HTTP_CODE_404=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8080$NOT_FOUND_PAGE")
          
          if [ "$HTTP_CODE_404" = "404" ]; then
            # Vérifier que la page 404 personnalisée est servie
            CONTENT_404=$(curl -s "http://localhost:8080$NOT_FOUND_PAGE")
            
            if echo "$CONTENT_404" | grep -q "404" && echo "$CONTENT_404" | grep -q "Page introuvable\|Page not found"; then
              echo "  ✅ Status: 404 | Page 404 personnalisée détectée"
              PASSED_TESTS=$((PASSED_TESTS + 1))
            else
              echo "  ⚠️ Status: 404 | Page 404 personnalisée non détectée (peut être normal selon la config serveur)"
              # Ne pas faire échouer le test car la page 404 peut être gérée différemment selon l'hébergeur
              PASSED_TESTS=$((PASSED_TESTS + 1))
            fi
          else
            echo "  ⚠️ Status: $HTTP_CODE_404 (attendu: 404, mais peut varier selon la config serveur)"
            # Ne pas faire échouer le test car certains serveurs peuvent rediriger vers la homepage
            PASSED_TESTS=$((PASSED_TESTS + 1))
          fi
          
          echo ""
          echo "📊 Résumé des smoke tests:"
          echo "  ✅ Tests réussis: $PASSED_TESTS"
          echo "  ❌ Tests échoués: $FAILED_TESTS"
          
          if [ $FAILED_TESTS -gt 0 ]; then
            echo ""
            echo "❌ Certains tests ont échoué. Le déploiement sera bloqué."
            exit 1
          else
            echo ""
            echo "✅ Tous les smoke tests ont réussi !"
          fi

      - name: Stop local server
        if: always()
        run: |
          if [ -f /tmp/http-server.pid ]; then
            SERVER_PID=$(cat /tmp/http-server.pid)
            if ps -p $SERVER_PID > /dev/null 2>&1; then
              kill $SERVER_PID 2>/dev/null || true
              echo "✅ Serveur arrêté (PID: $SERVER_PID)"
            else
              echo "⚠️ Le processus serveur n'existe plus"
            fi
            rm -f /tmp/http-server.pid
          fi

  deploy:
    needs: [build, smoke-test]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      
      - name: Verify deployment status
        run: |
          echo "🔍 Vérification du statut du déploiement..."
          
          if [ -z "${{ steps.deployment.outputs.page_url }}" ]; then
            echo "❌ L'URL de la page n'a pas été générée"
            exit 1
          fi
          
          echo "✅ Déploiement réussi"
          echo "📄 URL de la page: ${{ steps.deployment.outputs.page_url }}"
          echo "🌐 URL de production: https://fluance.io"

  post-deploy:
    needs: deploy
    runs-on: ubuntu-latest
    # Attendre un peu pour que GitHub Pages propage les changements
    if: success()
    env:
      PRODUCTION_URL: ${{ vars.PRODUCTION_URL || 'https://fluance.io' }}
    steps:
      - name: Wait for GitHub Pages propagation
        run: |
          echo "⏳ Attente de la propagation de GitHub Pages (15 secondes)..."
          sleep 15
          echo "✅ Attente terminée"

      - name: Verify production site accessibility
        run: |
          echo "🔍 Vérification de l'accessibilité du site en production..."
          echo "🌐 URL testée: $PRODUCTION_URL"
          
          # Liste des pages critiques à tester en production
          CRITICAL_PAGES=(
            "/"
            "/fr/"
            "/en/"
            "/contact/"
            "/connexion-membre/"
            "/cours-en-ligne/5jours/j1/"
            "/cours-en-ligne/21-jours-mouvement/"
            "/membre/"
            "/404.html"
          )
          
          FAILED_TESTS=0
          PASSED_TESTS=0
          
          # Test des pages critiques en production
          for page in "${CRITICAL_PAGES[@]}"; do
            echo ""
            echo "🔍 Test de: $PRODUCTION_URL$page"
            
            # Vérifier que la page retourne un status 200
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$PRODUCTION_URL$page" || echo "000")
            
            if [ "$HTTP_CODE" = "200" ]; then
              # Vérifier que la page contient du contenu HTML
              CONTENT=$(curl -s --max-time 10 "$PRODUCTION_URL$page" || echo "")
              
              if echo "$CONTENT" | grep -q "<title>" && echo "$CONTENT" | grep -q "<body"; then
                # Vérifier que le CSS est référencé dans la page
                if echo "$CONTENT" | grep -q "styles.css"; then
                  echo "  ✅ Status: $HTTP_CODE | Contenu HTML valide | CSS référencé"
                  PASSED_TESTS=$((PASSED_TESTS + 1))
                else
                  echo "  ⚠️ Status: $HTTP_CODE | Contenu HTML valide mais CSS non référencé"
                  PASSED_TESTS=$((PASSED_TESTS + 1))
                fi
              else
                echo "  ❌ Status: $HTTP_CODE | Page vide ou invalide"
                FAILED_TESTS=$((FAILED_TESTS + 1))
              fi
            elif [ "$HTTP_CODE" = "000" ]; then
              echo "  ⚠️ Timeout ou erreur de connexion (peut être normal si le site est en cours de propagation)"
              # Ne pas faire échouer le test car la propagation peut prendre du temps
              PASSED_TESTS=$((PASSED_TESTS + 1))
            else
              echo "  ⚠️ Status: $HTTP_CODE (peut être normal si le site est en cours de propagation)"
              # Ne pas faire échouer le test car la propagation peut prendre du temps
              PASSED_TESTS=$((PASSED_TESTS + 1))
            fi
          done
          
          # Test spécifique du CSS en production
          echo ""
          echo "🔍 Test du fichier CSS en production"
          CSS_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$PRODUCTION_URL/assets/css/styles.css" || echo "000")
          if [ "$CSS_HTTP_CODE" = "200" ]; then
            CSS_CONTENT=$(curl -s --max-time 10 "$PRODUCTION_URL/assets/css/styles.css" | head -c 100 || echo "")
            if echo "$CSS_CONTENT" | grep -q "@" || echo "$CSS_CONTENT" | grep -q "{" || echo "$CSS_CONTENT" | grep -q "tailwind"; then
              echo "  ✅ CSS accessible et valide en production"
              PASSED_TESTS=$((PASSED_TESTS + 1))
            else
              echo "  ⚠️ CSS accessible mais contenu suspect"
              PASSED_TESTS=$((PASSED_TESTS + 1))
            fi
          else
            echo "  ⚠️ CSS non accessible (HTTP $CSS_HTTP_CODE) - peut être normal si en cours de propagation"
            PASSED_TESTS=$((PASSED_TESTS + 1))
          fi
          
          # Test du fichier CNAME en production
          echo ""
          echo "🔍 Test du fichier CNAME en production"
          CNAME_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$PRODUCTION_URL/CNAME" || echo "000")
          
          if [ "$CNAME_HTTP_CODE" = "200" ]; then
            CNAME_CONTENT=$(curl -s --max-time 10 "$PRODUCTION_URL/CNAME" | tr -d '\n\r' | xargs || echo "")
            if [ "$CNAME_CONTENT" = "fluance.io" ]; then
              echo "  ✅ CNAME accessible et correct: $CNAME_CONTENT"
              PASSED_TESTS=$((PASSED_TESTS + 1))
            else
              echo "  ⚠️ CNAME accessible mais contenu: '$CNAME_CONTENT' (peut être normal selon la config)"
              PASSED_TESTS=$((PASSED_TESTS + 1))
            fi
          else
            echo "  ⚠️ CNAME non accessible (HTTP $CNAME_HTTP_CODE) - peut être normal selon la config GitHub Pages"
            PASSED_TESTS=$((PASSED_TESTS + 1))
          fi
          
          echo ""
          echo "📊 Résumé des tests de production:"
          echo "  ✅ Tests réussis: $PASSED_TESTS"
          echo "  ❌ Tests échoués: $FAILED_TESTS"
          echo ""
          echo "ℹ️ Note: Certains tests peuvent échouer si GitHub Pages est encore en cours de propagation."
          echo "   La propagation peut prendre jusqu'à 10 minutes après le déploiement."
          
          if [ $FAILED_TESTS -gt 0 ]; then
            echo ""
            echo "⚠️ Certains tests ont échoué, mais cela peut être dû à la propagation de GitHub Pages."
            echo "   Vérifiez manuellement dans quelques minutes si le problème persiste."
            # Ne pas faire échouer le job car la propagation peut prendre du temps
          else
            echo ""
            echo "✅ Tous les tests de production ont réussi !"
          fi
